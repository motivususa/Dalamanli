[build]
  base      = "winXP"
  command   = "npm install --legacy-peer-deps && npm run build"
  publish   = "winXP/build"
  functions = "netlify/functions"

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[build.environment]
  NPM_FLAGS   = "--legacy-peer-deps"
  NODE_VERSION = "18"

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
